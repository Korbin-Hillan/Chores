name: ChoresApp
options:
  bundleIdPrefix: com.korbinhillan
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES

targets:
  ChoresApp:
    type: application
    platform: iOS
    sources:
      - path: Sources/ChoresApp
    resources:
      - path: Sources/ChoresApp/Resources/Assets.xcassets
    info:
      path: Sources/ChoresApp/Resources/Info.generated.plist
      properties:
        CFBundleDisplayName: Chores
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSupportsIndirectInputEvents: true
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: "Used to capture photos of rooms so the AI can suggest tailored chores."
        NSPhotoLibraryUsageDescription: "Used to pick room photos so the AI can suggest tailored chores."
        ApiBaseURL: $(API_BASE_URL)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.korbinhillan.choresapp
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        API_BASE_URL: https://choresapp-api.onrender.com
      configs:
        Debug:
          API_BASE_URL: https://choresapp-api.onrender.com
        Release:
          API_BASE_URL: https://choresapp-api.onrender.com

  ChoresAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/ChoresAppTests
    dependencies:
      - target: ChoresApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.korbinhillan.choresapp.tests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/ChoresApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/ChoresApp

schemes:
  ChoresApp:
    build:
      targets:
        ChoresApp: all
        ChoresAppTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ChoresAppTests
    archive:
      config: Release
