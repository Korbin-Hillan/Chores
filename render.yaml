services:
  - name: choresapp-api
    type: web
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: KEY_ENCRYPTION_SECRET
        generateValue: true
